<form class="toform" (ngSubmit)="saveTodo()">
  <fieldset class="toform__fieldset">
    <legend class="toform__legend">Add a task</legend>

    <label class="toform__label" for="title">Title :</label>
    <input
      id="title"
      class="toform__input neumorphic"
      type="text"
      placeholder="task title"
      [(ngModel)]="title" name="todo title"
      required />

    <button class="toform__button neumorphic" type="submit">Add</button>
  </fieldset>
</form>
